services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: voice2bite-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: voice2bitedb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d voice2bitedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Token Bucket & BullMQ
  redis:
    image: redis:alpine
    container_name: voice2bite-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant for RAG
  qdrant:
    image: qdrant/qdrant
    container_name: voice2bite-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  # Jaeger for Distributed Tracing & Observability
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: voice2bite-jaeger
    ports:
      - "16686:16686" # UI Dashboard
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver

  # Database Seeder (Ephemeral)
  db-seeder:
    build:
      context: ./voice2bite_Backend
      dockerfile: Dockerfile
    container_name: voice2bite-seeder
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/voice2bitedb
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed"
    depends_on:
      postgres:
        condition: service_healthy

  # Primary API Gateway (Node.js)
  node-backend:
    build:
      context: ./voice2bite_Backend
      dockerfile: Dockerfile
    container_name: voice2bite-api
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://user:password@postgres:5432/voice2bitedb
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET=supersecretjwt
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - REDIS_HOST=redis
    ports:
      - "4000:4000"
    command: >
      sh -c "npm start"
    depends_on:
      db-seeder:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      voice-backend:
        condition: service_started

  # Voice AI Microservice (Python)
  voice-backend:
    build:
      context: ./voice2bite_whisperbackend
      dockerfile: Dockerfile
    container_name: voice2bite-ai
    environment:
      - PORT=5000
      - QDRANT_URL=http://qdrant:6333
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - REDIS_HOST=redis

    depends_on:
      - qdrant

  # Frontend Web UI (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voice2bite-web
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - node-backend

volumes:
  pgdata:
  redisdata:
  qdrant_storage:
